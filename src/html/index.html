<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task List</title>
  <!-- <link rel="stylesheet" href="../output.css"/> -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Nunito', sans-serif; background-color: #b2ebf2; min-height: 100vh; }
    .modal-backdrop { background: rgba(100,120,130,0.45); }
  </style>
</head>
<body class="p-10">

  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-5xl font-black text-black">Task List</h1>
    <button onclick="openAddModal()" class="bg-purple-700 hover:bg-purple-800 text-white font-bold px-6 py-3 rounded-2xl text-lg transition">Add Task</button>
  </div>

  <!-- Table Header -->
  <div class="bg-white rounded-2xl px-8 py-5 mb-4 grid grid-cols-4 shadow-sm">
    <span class="text-cyan-400 font-bold text-lg">Task</span>
    <span class="text-cyan-400 font-bold text-lg">Priority</span>
    <span class="text-cyan-400 font-bold text-lg">Status</span>
    <span class="text-yellow-500 font-bold text-lg text-right">Action</span>
  </div>

  <!-- Task Rows -->
  <div id="taskList" class="flex flex-col gap-4"></div>

  <!-- Add/Edit Modal -->
  <div id="modal" class="hidden fixed inset-0 modal-backdrop flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-2xl relative">
      <div class="flex justify-between items-center mb-6">
        <h2 id="modalTitle" class="text-2xl font-extrabold">Add Task</h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 border border-gray-300 rounded-lg w-8 h-8 flex items-center justify-center text-xl font-bold">x</button>
      </div>

      <label class="block font-bold mb-2">Task</label>
      <input id="taskInput" type="text" placeholder="Web Homework"
        class="w-full border-2 border-cyan-400 rounded-xl px-4 py-3 mb-5 focus:outline-none focus:border-cyan-500 text-base"/>

      <label class="block font-bold mb-3">Priority</label>
      <div class="flex gap-3 mb-5">
        <button onclick="selectPriority('High')" data-p="High"
          class="priority-btn border-2 border-red-400 text-red-500 font-bold px-5 py-2 rounded-xl transition">High</button>
        <button onclick="selectPriority('Medium')" data-p="Medium"
          class="priority-btn border-2 border-yellow-400 text-yellow-500 font-bold px-5 py-2 rounded-xl transition">Medium</button>
        <button onclick="selectPriority('Low')" data-p="Low"
          class="priority-btn border-2 border-green-400 text-green-500 font-bold px-5 py-2 rounded-xl transition">Low</button>
      </div>

      <label class="block font-bold mb-3">Status</label>
      <div class="flex gap-3 mb-8">
        <button onclick="selectStatus('To Do')" data-s="To Do"
          class="status-btn border-2 border-cyan-400 text-cyan-500 font-bold px-5 py-2 rounded-xl transition">To Do</button>
        <button onclick="selectStatus('Progress')" data-s="Progress"
          class="status-btn border-2 border-cyan-400 text-cyan-500 font-bold px-5 py-2 rounded-xl transition">Progress</button>
        <button onclick="selectStatus('Done')" data-s="Done"
          class="status-btn border-2 border-cyan-400 text-cyan-500 font-bold px-5 py-2 rounded-xl transition">Done</button>
      </div>

      <div class="flex gap-4 justify-end">
        <button id="cancelBtn" onclick="closeModal()" class="hidden bg-red-500 hover:bg-red-600 text-white font-bold px-8 py-3 rounded-2xl transition">Cancel</button>
        <button id="actionBtn" onclick="handleAction()"
          class="bg-purple-700 hover:bg-purple-800 text-white font-bold px-10 py-3 rounded-2xl transition">Add</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="deleteModal" class="hidden fixed inset-0 modal-backdrop flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-10 w-full max-w-md shadow-2xl text-center">
      <p class="text-red-500 font-extrabold text-2xl mb-4">Are you sure ?</p>
      <div class="text-6xl mb-6">&#9888;&#65039;</div>
      <div class="flex gap-4 justify-center">
        <button onclick="confirmDelete()" class="bg-red-500 hover:bg-red-600 text-white font-bold px-8 py-3 rounded-2xl transition">Yes</button>
        <button onclick="closeDeleteModal()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold px-8 py-3 rounded-2xl transition">No</button>
      </div>
    </div>
  </div>

  <script>
    // Array of objects to store tasks
    let tasks = [
      { id: 1, name: 'Java Homwork', priority: 'High', status: 'Progress' },
      { id: 2, name: 'Korean Homwork', priority: 'Medium', status: 'Progress' },
      { id: 3, name: 'Java Project', priority: 'Low', status: 'Progress' },
    ];

    let nextId = 4;
    let editingId = null;
    let deletingId = null;
    let selectedPriority = '';
    let selectedStatus = '';

    const priorityTextColor = {
      High: 'text-red-500',
      Medium: 'text-yellow-500',
      Low: 'text-green-500'
    };

    // Render all tasks to the DOM
    function render() {
      const list = document.getElementById('taskList');
      list.innerHTML = '';

      tasks.forEach(task => {
        const row = document.createElement('div');
        row.className = 'bg-white rounded-2xl px-8 py-5 grid grid-cols-4 items-center shadow-sm';
        row.innerHTML = `
          <span class="font-bold text-black text-lg">${task.name}</span>
          <span class="font-bold text-lg ${priorityTextColor[task.priority]}">${task.priority}</span>
          <span class="font-bold text-black text-lg">${task.status}</span>
          <div class="flex gap-3 justify-end">
            <button onclick="openEditModal(${task.id})" class="text-indigo-700 hover:scale-110 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
              </svg>
            </button>
            <button onclick="openDeleteModal(${task.id})" class="text-red-600 hover:scale-110 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>
        `;
        list.appendChild(row);
      });
    }

    // Open Add modal
    function openAddModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Add Task';
      document.getElementById('taskInput').value = '';
      document.getElementById('actionBtn').textContent = 'Add';
      document.getElementById('cancelBtn').classList.add('hidden');
      selectedPriority = '';
      selectedStatus = '';
      refreshSelectionUI();
      document.getElementById('modal').classList.remove('hidden');
    }

    // Open Edit modal (pre-filled with task data)
    function openEditModal(id) {
      editingId = id;
      const task = tasks.find(t => t.id === id);
      document.getElementById('modalTitle').textContent = '';
      document.getElementById('taskInput').value = task.name;
      document.getElementById('actionBtn').textContent = 'Update';
      document.getElementById('cancelBtn').classList.remove('hidden');
      selectedPriority = task.priority;
      selectedStatus = task.status;
      refreshSelectionUI();
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function selectPriority(p) {
      selectedPriority = p;
      refreshSelectionUI();
    }

    function selectStatus(s) {
      selectedStatus = s;
      refreshSelectionUI();
    }

    // Update button active styles based on selection
    function refreshSelectionUI() {
      const priorityActive = {
        High: 'bg-red-500 text-white border-red-500',
        Medium: 'bg-yellow-400 text-white border-yellow-400',
        Low: 'bg-green-400 text-white border-green-400'
      };
      const priorityInactive = {
        High: 'border-red-400 text-red-500',
        Medium: 'border-yellow-400 text-yellow-500',
        Low: 'border-green-400 text-green-500'
      };

      document.querySelectorAll('.priority-btn').forEach(btn => {
        const p = btn.dataset.p;
        btn.className = `priority-btn border-2 font-bold px-5 py-2 rounded-xl transition ${
          p === selectedPriority ? priorityActive[p] : priorityInactive[p]
        }`;
      });

      document.querySelectorAll('.status-btn').forEach(btn => {
        const s = btn.dataset.s;
        btn.className = `status-btn border-2 font-bold px-5 py-2 rounded-xl transition ${
          s === selectedStatus
            ? 'bg-cyan-400 text-white border-cyan-400'
            : 'border-cyan-400 text-cyan-500'
        }`;
      });
    }

    // Handle Add or Update action
    function handleAction() {
      const name = document.getElementById('taskInput').value.trim();
      if (!name || !selectedPriority || !selectedStatus) {
        alert('Please fill in all fields.');
        return;
      }

      if (editingId !== null) {
        // Update existing task
        const task = tasks.find(t => t.id === editingId);
        task.name = name;
        task.priority = selectedPriority;
        task.status = selectedStatus;
      } else {
        // Add new task object
        tasks.push({ id: nextId++, name, priority: selectedPriority, status: selectedStatus });
      }

      closeModal();
      render();
    }

    // Open delete confirmation modal
    function openDeleteModal(id) {
      deletingId = id;
      document.getElementById('deleteModal').classList.remove('hidden');
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.add('hidden');
    }

    // Confirm and delete task from array
    function confirmDelete() {
      tasks = tasks.filter(t => t.id !== deletingId);
      closeDeleteModal();
      render();
    }

    // Initial render
    render();
  </script>
</body>
</html>
