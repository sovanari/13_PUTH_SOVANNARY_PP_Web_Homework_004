<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body class="p-10 min-h-screen" style="font-family:'Nunito',sans-serif; background-color:#b2ebf2;">

  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-4xl font-black text-black">Task List</h1>
    <button onclick="openAddModal()"
      class="bg-purple-700 hover:bg-purple-900 hover:scale-105 transition-all duration-200 text-white font-bold px-6 py-3 rounded-2xl text-lg">
      Add Task
    </button>
  </div>

  <!-- Table labels -->
  <div class="bg-white rounded-2xl px-8 py-5 mb-4 grid grid-cols-4 shadow-sm">
    <span class="text-cyan-400 font-bold text-xl">Task</span>
    <span class="text-cyan-400 font-bold text-xl">Priority</span>
    <span class="text-cyan-400 font-bold text-xl">Status</span>
    <span class="text-yellow-500 font-bold text-xl text-right">Action</span>
  </div>

  <!-- Task rows -->
  <div id="taskList" class="flex flex-col gap-4"></div>


  <!-- ADD / EDIT MODAL -->
  <div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-2xl">

      <div class="flex justify-between items-center mb-6">
        <h2 id="modalTitle" class="text-2xl font-extrabold">Add Task</h2>
        <button onclick="closeModal()"
          class="text-gray-400 hover:text-white hover:bg-gray-400 transition-all duration-200 border border-gray-300 rounded-lg w-8 h-8 flex items-center justify-center text-xl font-bold">
          &#x2715;
        </button>
      </div>

      <label class="block font-bold mb-2">Task</label>
      <input id="taskInput" type="text" placeholder="Ex: Web Homework"
        class="w-full border-2 border-cyan-400 rounded-xl px-4 py-3 mb-5 outline-none focus:border-cyan-600 text-base"/>

      <!-- Priority buttons -->
      <label class="block font-bold mb-3">Priority</label>
      <div class="flex gap-3 mb-5">
        <button onclick="selectPriority('High')"   data-p="High"   class="priority-btn transition-all duration-200">High</button>
        <button onclick="selectPriority('Medium')" data-p="Medium" class="priority-btn transition-all duration-200">Medium</button>
        <button onclick="selectPriority('Low')"    data-p="Low"    class="priority-btn transition-all duration-200">Low</button>
      </div>

      <!-- Status buttons -->
      <label class="block font-bold mb-3">Status</label>
      <div class="flex gap-3 mb-8">
        <button onclick="selectStatus('To Do')"    data-s="To Do"    class="status-btn transition-all duration-200">To Do</button>
        <button onclick="selectStatus('Progress')" data-s="Progress" class="status-btn transition-all duration-200">Progress</button>
        <button onclick="selectStatus('Done')"     data-s="Done"     class="status-btn transition-all duration-200">Done</button>
      </div>

      <div class="flex gap-4 justify-end">
        <button id="cancelBtn" onclick="closeModal()"
          class="hidden bg-red-500 hover:bg-red-700 hover:scale-105 transition-all duration-200 text-white font-bold px-8 py-3 rounded-2xl">
          Cancel
        </button>
        <button id="actionBtn" onclick="handleAction()"
          class="bg-purple-700 hover:bg-purple-900 hover:scale-105 transition-all duration-200 text-white font-bold px-10 py-3 rounded-2xl">
          Add
        </button>
      </div>
    </div>
  </div>

  <!-- DELETE MODAL -->
  <div id="deleteModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-10 w-full max-w-md shadow-2xl text-center">
      <p class="text-red-500 font-extrabold text-2xl mb-4">Are you sure?</p>
      <div class="text-6xl mb-6">&#9888;&#65039;</div>
      <div class="flex gap-4 justify-center">
        <button onclick="confirmDelete()"
          class="bg-red-500 hover:bg-red-700 hover:scale-105 transition-all duration-200 text-white font-bold px-8 py-3 rounded-2xl">Yes</button>
        <button onclick="closeDeleteModal()"
          class="bg-blue-500 hover:bg-blue-700 hover:scale-105 transition-all duration-200 text-white font-bold px-8 py-3 rounded-2xl">No</button>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>

</body>
</html>
